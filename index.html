<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee DOOH Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🎬 VÍDEO */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:black;
  z-index:1;
}

/* ⚠️ ERRO VISUAL */
#erro {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  color:#ff4444;
  font-size:28px;
  text-align:center;
  z-index:20;
  display:none;
}

/* 📺 BARRA SUPERIOR */
#topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100px;
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  align-items:center;
  padding:0 25px;
  z-index:10;
}

#logo {
  font-size:28px;
  color:#FFD700;
  margin-right:30px;
  font-weight:bold;
}

/* TEXTO ROLANDO */
#marquee {
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
  font-size:28px;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<!-- 📺 BARRA -->
<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee">
    <span id="info">Carregando sistema...</span>
  </div>
</div>

<!-- ⚠️ ERRO -->
<div id="erro">⚠️ Verifique os vídeos</div>

<!-- 🎬 PLAYER -->
<video id="player" muted playsinline webkit-playsinline preload="auto"></video>

<script>
const player = document.getElementById("player");
const erro = document.getElementById("erro");

//////////////////////////////////////////////////
// 🔥 CONFIGURE AQUI SEUS VÍDEOS
//////////////////////////////////////////////////

const videos = [
  // ESCOLHA UMA OPÇÃO:

  // 👉 LOCAL (tablet)
  //"file:///storage/emulated/0/Download/video1.mp4",

  // 👉 MESMA PASTA DO HTML
  "./video1.mp4",
  "./video2.mp4",

  // 👉 ONLINE (recomendado futuramente)
  //"https://seusite.com/video1.mp4"
];

let index = 0;

function carregarVideo(){

  erro.style.display = "none";

  let source = videos[index];

  console.log("▶️ Tentando:", source);

  player.pause();
  player.removeAttribute("src");
  player.load();

  setTimeout(() => {

    player.src = source;

    player.oncanplay = () => {
      console.log("✅ Vídeo carregado");
      player.play().catch(() => {});
    };

  }, 300);
}

//////////////////////////////////////////////////
// EVENTOS
//////////////////////////////////////////////////

player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

player.onerror = () => {
  console.log("❌ ERRO no vídeo:", videos[index]);

  erro.style.display = "block";

  // pula pro próximo
  index = (index + 1) % videos.length;

  setTimeout(carregarVideo, 2000);
};

//////////////////////////////////////////////////
// INICIAR
//////////////////////////////////////////////////

carregarVideo();

//////////////////////////////////////////////////
// ⏰ INFO + WHATS
//////////////////////////////////////////////////

function atualizarInfo(){
  let hora = new Date().toLocaleTimeString("pt-BR");

  document.getElementById("info").innerText =
    `São Leopoldo • ${hora} • Anuncie aqui (51) 9 8017 1851`;
}

setInterval(atualizarInfo, 5000);
atualizarInfo();

//////////////////////////////////////////////////
// 🔒 FORÇA AUTOPLAY (ANDROID)
//////////////////////////////////////////////////

document.body.addEventListener("click", () => {
  player.play().catch(() => {});
});

</script>

</body>
</html>
