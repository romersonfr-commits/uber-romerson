<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bee DOOH Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:black;
  z-index:1;

  opacity:1;
  transition: opacity 0.8s ease-in-out;
}

#topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:90px;
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:10;
}

/* ✅ LOGO COMO IMAGEM */
#logo {
  height:60px;
  width:auto;
  margin-right:25px;
  flex-shrink:0;
}

/* área do texto */
#marquee {
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

/* texto rolando */
#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
  font-size:26px;
}

/* animação */
@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}

/* 📱 RESPONSIVIDADE (TABLET / TELAS MENORES) */
@media (max-width: 1024px) {

  #topbar {
    height:70px;
    padding:0 15px;
  }

  #logo {
    height:45px;
    margin-right:15px;
  }

  #marquee span {
    font-size:20px;
  }

}
</style>

</head>

<body>

<div id="topbar">

  <!-- ✅ LOGO (CLOUDINARY) -->
  <img id="logo" src="https://res.cloudinary.com/dfe8shcvj/image/upload/w_300/v1774665755/bee_geo_marketing_transparente_wee210.png">

  <div id="marquee">
    <span id="info"></span>
  </div>

</div>

<video id="player" muted playsinline></video>

<script>

/* VÍDEOS */
const videos = [

"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643064/Patelaria_bnnooc.mp4",
"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643064/Revenda_sos7xr.mp4",
"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643065/Pizzaria_ee2k3q.mp4",
"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643065/Brigadeiro_xr3xdd.mp4",
"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643062/Hamburguer_fhgv8b.mp4",
"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643056/Anuncie_Aqui_q2zx9r.mp4"

];

let index = 0;
const player = document.getElementById("player");

function carregarVideo(){

  let src = videos[index];

  player.style.opacity = 0;

  setTimeout(() => {

    player.pause();
    player.removeAttribute("src");
    player.load();

    player.src = src;

    player.play().catch(()=>{});

    setTimeout(() => {
      player.style.opacity = 1;
    }, 100);

  }, 800);
}

player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

player.onerror = () => {
  index = (index + 1) % videos.length;
  setTimeout(carregarVideo, 2000);
};

carregarVideo();

/* 🌦️ CLIMA */
let temperatura = "--";
let climaIcone = "☀️";

function buscarClima(){

  fetch("https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true")
    .then(res => res.json())
    .then(data => {

      temperatura = Math.round(data.current_weather.temperature);

      let code = data.current_weather.weathercode;

      if(code === 0) climaIcone = "☀️";
      else if(code <= 3) climaIcone = "⛅";
      else if(code <= 48) climaIcone = "☁️";
      else if(code <= 67) climaIcone = "🌧️";
      else if(code <= 77) climaIcone = "🌨️";
      else climaIcone = "🌩️";

    })
    .catch(() => {});
}

buscarClima();
setInterval(buscarClima, 600000);

/* 📅 INFO */
function atualizarInfo(){

  let agora = new Date();

  let hora = agora.toLocaleTimeString("pt-BR");
  let diaSemana = agora.toLocaleDateString("pt-BR", { weekday: 'long' });
  let data = agora.toLocaleDateString("pt-BR");

  document.getElementById("info").innerText =
    `São Leopoldo • ${temperatura}°C ${climaIcone} • ${diaSemana} • ${data} • ${hora} • Anuncie aqui (51) 9 8017 1851`;
}

setInterval(atualizarInfo, 5000);
atualizarInfo();

/* 🔄 AUTO RELOAD */
setTimeout(() => {
  location.reload(true);
}, 420000);

</script>

</body>
</html>
