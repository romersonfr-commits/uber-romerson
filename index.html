<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bee DOOH Player PRO</title>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
/* 🔧 CONFIGURAÇÃO VISUAL GERAL */
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* 🎥 PLAYER */
#player {
  width:100vw;
  height:100vh;
  object-fit:cover; /* 👉 ALTERAR: cover / contain */
}

/* 🔝 BARRA SUPERIOR */
#topbar {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.5); /* 👉 ALTERAR transparência */
  color:white;
  padding:10px;
  font-size:22px; /* 👉 ALTERAR tamanho texto */
}
</style>
</head>

<body>

<div id="topbar">
  <span id="info">Carregando...</span>
</div>

<video id="player" autoplay muted></video>

<script>

/* =========================
   🔐 CONFIG FIREBASE
   👉 COLE AQUI O SEU
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🚗 IDENTIFICAÇÃO DO CARRO
   👉 ALTERAR AQUI
========================= */

const DEVICE_ID = "carro_01";

/* =========================
   🎥 PLAYER
========================= */

let videos = [];
let index = 0;
const player = document.getElementById("player");

/* 🔄 CARREGAR DADOS DO FIREBASE */
function iniciarListener(){

  db.collection("devices").doc(DEVICE_ID)
  .onSnapshot(doc => {

    if(!doc.exists) return;

    const data = doc.data();

    /* 🔥 LIGA / DESLIGA REMOTO */
    if(data.status === "off"){
      player.pause();
      return;
    }

    /* 🎥 ATUALIZA LISTA DE VÍDEOS */
    videos = data.videos || [];

    /* 🏙️ ALTERAR CIDADE */
    cidade = data.cidade || "Cidade";

  });
}

iniciarListener();

/* ▶️ TROCAR VÍDEO */
function carregarVideo(){

  if(videos.length === 0) return;

  player.src = videos[index];
  player.play();

  /* 📊 LOG DE EXECUÇÃO */
  registrarLog(videos[index]);
}

/* 🔄 LOOP */
player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

/* 📊 ENVIAR LOG */
function registrarLog(video){

  db.collection("logs").add({
    device: DEVICE_ID,
    video: video,
    data: new Date()
  });
}

/* =========================
   🌍 GEOLOCALIZAÇÃO
========================= */

let cidade = "Carregando...";

navigator.geolocation.getCurrentPosition(pos => {

  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  buscarClima(lat, lon);

});

/* =========================
   🌦️ CLIMA DINÂMICO
========================= */

let temp = "--";
let icon = "☀️";

function buscarClima(lat, lon){

  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
  .then(r=>r.json())
  .then(data=>{

    temp = Math.round(data.current_weather.temperature);

  });
}

/* =========================
   🕒 INFO TOPO
========================= */

function atualizarInfo(){

  let agora = new Date();

  document.getElementById("info").innerText =
  `${cidade} • ${temp}°C • ${agora.toLocaleTimeString()} • Anuncie aqui`;

}

setInterval(atualizarInfo, 3000);

/* 🚀 INICIAR PLAYER */
setInterval(()=>{
  if(player.paused && videos.length > 0){
    carregarVideo();
  }
},2000);

</script>

</body>
</html>
