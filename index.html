<!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">

<video id="player" muted autoplay playsinline></video>

<style>
#player {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:1;
  transition: opacity 0.8s ease-in-out;
}
</style>

<script>
const player = document.getElementById("player");

//////////////////////////////////////////////////
// 📍 ZONAS
//////////////////////////////////////////////////

function getZona(lat, lon) {

  if (lat > -29.77 && lat < -29.75 && lon > -51.16 && lon < -51.14) {
    return "centro";
  }

  if (lat > -29.73 && lat < -29.71 && lon > -51.15 && lon < -51.13) {
    return "scharlau";
  }

  if (lat > -29.75 && lat < -29.72 && lon > -51.12 && lon < -51.08) {
    return "feitoria";
  }

  if (lat > -29.76 && lat < -29.74 && lon > -51.14 && lon < -51.11) {
    return "padrereus";
  }

  if (lat > -29.79 && lat < -29.76 && lon > -51.18 && lon < -51.15) {
    return "campina";
  }

  return "centro";
}

//////////////////////////////////////////////////
// 🎬 ANÚNCIOS (⚠️ USE SÓ LINKS VÁLIDOS)
//////////////////////////////////////////////////

const anuncios = {

  centro: [
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297195/oficina_vrzqlz.mp4"
  ],

  scharlau: [
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297195/oficina_vrzqlz.mp4"
  ],

  feitoria: [
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/hamburgueria_hdbmki.mp4",
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/churrasco_ya02cz.mp4",
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/petshop_tggjrw.mp4"
  ],

  padrereus: [
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297195/oficina_vrzqlz.mp4"
  ],

  campina: [
    "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/praia_x5rr9p.mp4"
  ]
};

//////////////////////////////////////////////////
// ▶️ PLAYER INTELIGENTE
//////////////////////////////////////////////////

let index = 0;
let videos = [];

function tocarVideo() {

  if (!videos.length) return;

  player.style.opacity = 0;

  setTimeout(() => {

    player.src = videos[index];

    player.play().catch(() => {
      console.log("Erro ao reproduzir, pulando...");
      proximoVideo();
    });

    player.style.opacity = 1;

  }, 800);
}

function proximoVideo() {
  index = (index + 1) % videos.length;
  tocarVideo();
}

player.addEventListener("ended", proximoVideo);

// 👉 NOVO: se der erro no vídeo, pula
player.addEventListener("error", () => {
  console.log("Erro no vídeo, pulando...");
  proximoVideo();
});

//////////////////////////////////////////////////
// 📡 GEOLOCALIZAÇÃO
//////////////////////////////////////////////////

function iniciarSistema() {

  navigator.geolocation.watchPosition(function(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    const zona = getZona(lat, lon);

    console.log("ZONA:", zona);

    const novosVideos = anuncios[zona];

    if (JSON.stringify(novosVideos) !== JSON.stringify(videos)) {
      videos = novosVideos;
      index = 0;
      tocarVideo();
    }

  }, function() {

    videos = anuncios["centro"];
    tocarVideo();

  });
}

iniciarSistema();

</script>

</body>
</html>
