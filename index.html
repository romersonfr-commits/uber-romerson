<!DOCTYPE html>
<html lang<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bee DOOH Player</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🎬 VÍDEO */
#player {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  background:black;
  transition: opacity 0.5s;
}

/* 📺 BARRA SUPERIOR */
#topbar {
  position:fixed;
  top:0;
  width:100%;
  height:50px;
  background:rgba(0,0,0,0.7);
  color:white;
  display:flex;
  align-items:center;
  padding:0 15px;
  font-size:18px;
  z-index:10;
}

#logo {
  font-weight:bold;
  color:#FFD700;
  margin-right:20px;
}

/* TEXTO ROLANDO */
#marquee {
  flex:1;
  white-space:nowrap;
  overflow:hidden;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<!-- 📺 BARRA -->
<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee">
    <span id="info">Iniciando sistema...</span>
  </div>
</div>

<!-- 🎬 PLAYER -->
<video id="player" muted playsinline></video>

<script>
const player = document.getElementById("player");

//////////////////////////////////////////////////
// 🎬 PLAYLIST (IMPORTANTE: nomes exatos dos arquivos)
//////////////////////////////////////////////////

const videos = [
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774379953/Design_sem_nome_1_vdkqmd.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297195/oficina_vrzqlz.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774378096/Design_sem_nome_osvmoo.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/hamburgueria_hdbmki.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/churrasco_ya02cz.mp4"
];

let index = 0;

function carregarVideo() {

  let source = videos[index];

  console.log("▶️ Tocando:", source);

  player.style.opacity = 0;

  setTimeout(() => {

    player.src = source;
    player.load();

    player.onloadeddata = () => {
      player.play().catch(err => {
        console.log("Erro autoplay:", err);
      });
      player.style.opacity = 1;
    };

  }, 300);
}

// próximo vídeo
player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

// erro (pula pro próximo)
player.onerror = () => {
  console.log("❌ Erro no vídeo:", videos[index]);
  index = (index + 1) % videos.length;
  carregarVideo();
};

// iniciar
carregarVideo();

//////////////////////////////////////////////////
// ⏰ INFO (NUNCA TRAVA)
//////////////////////////////////////////////////

async function atualizarInfo(){

  let hora = new Date().toLocaleTimeString("pt-BR");

  let texto = `São Leopoldo • ${hora} • Carregando...`;

  document.getElementById("info").innerText = texto;

  try {

    navigator.geolocation.getCurrentPosition(async pos => {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      try {
        let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        let climaData = await climaReq.json();

        let temp = Math.round(climaData.current_weather.temperature);

        texto = `Sua região • ${hora} • ${temp}°C ☀️ • Anuncie aqui`;

      } catch {
        texto = `Sua região • ${hora} • Anuncie aqui`;
      }

      document.getElementById("info").innerText = texto;

    }, () => fallback());

  } catch {
    fallback();
  }

  async function fallback(){
    try {
      let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true`);
      let climaData = await climaReq.json();

      let temp = Math.round(climaData.current_weather.temperature);

      texto = `São Leopoldo • ${hora} • ${temp}°C ☀️ • Anuncie aqui`;

    } catch {
      texto = `São Leopoldo • ${hora} • Anuncie aqui`;
    }

    document.getElementById("info").innerText = texto;
  }

}

setInterval(atualizarInfo, 10000);
atualizarInfo();

</script>

</body>

<script>
const player = document.getElementById("player");

//////////////////////////////////////////////////
// 🎬 VÍDEOS
//////////////////////////////////////////////////

const videos = [
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/hamburgueria_hdbmki.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/churrasco_ya02cz.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774378096/Design_sem_nome_osvmoo.mp4",

  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774379953/Design_sem_nome_1_vdkqmd.mp4"
];

let index = 0;

function playNext(){
  player.style.opacity = 0;

  setTimeout(()=>{
    player.src = videos[index];
    player.play();
    player.style.opacity = 1;

    index = (index + 1) % videos.length;
  }, 800);
}

player.addEventListener("ended", playNext);
playNext();

//////////////////////////////////////////////////
// 📺 INFO (COM FALLBACK)
//////////////////////////////////////////////////

async function atualizarInfo(){

  let hora = new Date().toLocaleTimeString("pt-BR");

  // TEXTO PADRÃO (caso tudo falhe)
  let texto = `São Leopoldo • ${hora} • Carregando clima...`;

  try {

    navigator.geolocation.getCurrentPosition(async pos => {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      // 🌤️ clima
      let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
      let climaData = await climaReq.json();

      let temp = Math.round(climaData.current_weather.temperature);

      texto = `Sua região • ${hora} • ${temp}°C ☀️ • Anuncie aqui`;

      document.getElementById("info").innerText = texto;

    }, () => {
      // 🚫 sem localização → usa fallback fixo
      climaFallback();
    });

  } catch {
    climaFallback();
  }

  // fallback fixo
  async function climaFallback(){
    try{
      let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true`);
      let climaData = await climaReq.json();

      let temp = Math.round(climaData.current_weather.temperature);

      texto = `São Leopoldo • ${hora} • ${temp}°C ☀️ • Anuncie aqui`;

    } catch {
      texto = `São Leopoldo • ${hora} • Anuncie aqui`;
    }

    document.getElementById("info").innerText = texto;
  }

  // mostra algo imediatamente
  document.getElementById("info").innerText = texto;

}

setInterval(atualizarInfo, 10000);
atualizarInfo();

</script>
