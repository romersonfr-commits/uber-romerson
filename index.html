<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bee Player</title>

<!-- ✅ FIREBASE VERSÃO COMPATÍVEL -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  background:black;
}

#player{
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#topbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<div id="topbar">
  <span id="info">Carregando...</span>
</div>

<video id="player" autoplay muted playsinline></video>

<script>

/* 🔐 COLE SUA CONFIG AQUI */
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🚗 ID DO CARRO */
const DEVICE_ID = "carro_01";

/* 🎥 PLAYER */
let videos = [];
let index = 0;
const player = document.getElementById("player");

/* 🔄 ESCUTA FIREBASE */
db.collection("devices").doc(DEVICE_ID)
.onSnapshot(function(doc){

  if(!doc.exists) return;

  const data = doc.data();

  if(data.status === "off"){
    player.pause();
    return;
  }

  videos = data.videos || [];

  /* 🚀 INICIA PLAYER */
  if(videos.length > 0){
    index = 0;
    carregarVideo();
  }

});

/* ▶️ CARREGAR VÍDEO */
function carregarVideo(){

  if(videos.length === 0) return;

  player.src = videos[index];

  player.play().catch(function(e){
    console.log("Erro ao rodar:", e);
  });

}

/* 🔄 LOOP */
player.onended = function(){
  index = (index + 1) % videos.length;
  carregarVideo();
};

/* 🕒 INFO */
function atualizarInfo(){
  let agora = new Date();
  document.getElementById("info").innerText =
  "Bee DOOH • " + agora.toLocaleTimeString();
}

setInterval(atualizarInfo, 2000);

</script>

</body>
</html>
