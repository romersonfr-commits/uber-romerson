<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee DOOH Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* PLAYER */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:black;
  z-index:1;
}

/* ERRO VISUAL */
#erro {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  color:red;
  font-size:30px;
  z-index:20;
  display:none;
}

/* TOPBAR */
#topbar {
  position:fixed;
  top:0;
  width:100%;
  height:100px;
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  align-items:center;
  padding:0 25px;
  z-index:10;
}

#logo {
  font-size:28px;
  color:#FFD700;
  margin-right:30px;
  font-weight:bold;
}

#marquee {
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
  font-size:28px;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee">
    <span id="info">Carregando sistema...</span>
  </div>
</div>

<div id="erro">⚠️ Vídeo não encontrado</div>

<video id="player" muted autoplay playsinline></video>

<script>
const player = document.getElementById("player");
const erro = document.getElementById("erro");

//////////////////////////////////////////////////
// 🔥 TROCA AQUI PELO CAMINHO CERTO
//////////////////////////////////////////////////

const videos = [
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774379953/Design_sem_nome_1_vdkqmd.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297195/oficina_vrzqlz.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774378096/Design_sem_nome_osvmoo.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/hamburgueria_hdbmki.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/v1774297193/churrasco_ya02cz.mp4"
];

let index = 0;

function carregarVideo(){

  erro.style.display = "none";

  let source = videos[index];

  console.log("Tentando:", source);

  player.src = source;
  player.load();

  player.oncanplay = () => {
    player.play();
  };

}

player.onerror = () => {
  console.log("ERRO ao carregar vídeo");
  erro.style.display = "block";
};

player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

carregarVideo();

//////////////////////////////////////////////////
// INFO
//////////////////////////////////////////////////

setInterval(() => {
  let hora = new Date().toLocaleTimeString("pt-BR");
  document.getElementById("info").innerText =
    `São Leopoldo • ${hora} • Anuncie aqui (51) 9 8017 1851`;
}, 5000);

</script>

</body>
</html>
