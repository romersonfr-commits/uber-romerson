<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bee DOOH Player</title>

<style>

/* RESET */
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

/* VÍDEO */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:black;
  z-index:1;
}

/* BARRA SUPERIOR */
#topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100px;
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  align-items:center;
  padding:0 25px;
  z-index:10;
}

/* LOGO */
#logo {
  font-size:28px;
  color:#FFD700;
  margin-right:30px;
  font-weight:bold;
}

/* TEXTO ROLANDO */
#marquee {
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
  font-size:28px;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}

</style>
</head>

<body>

<!-- BARRA -->
<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee">
    <span id="info">Carregando...</span>
  </div>
</div>

<!-- VÍDEO -->
<video id="player" muted playsinline></video>

<script>

/* =====================================================
🎬 VÍDEOS (CLOUDINARY)
===================================================== */

const videos = [
  "https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774379953/Design_sem_nome_1_vdkqmd.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774297195/oficina_vrzqlz.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774378096/Design_sem_nome_osvmoo.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774297193/hamburgueria_hdbmki.mp4",
  "https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774297193/churrasco_ya02cz.mp4"
];

/* =====================================================
🎯 PLAYER
===================================================== */

let index = 0;
const player = document.getElementById("player");

function carregarVideo(){

  let src = videos[index];

  player.pause();
  player.removeAttribute("src");
  player.load();

  setTimeout(() => {
    player.src = src;
    player.play().catch(()=>{});
  }, 300);
}

player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

player.onerror = () => {
  index = (index + 1) % videos.length;
  setTimeout(carregarVideo, 2000);
};

carregarVideo();

/* =====================================================
🌦️ CLIMA (OPEN-METEO - GRÁTIS)
===================================================== */

/*
📍 São Leopoldo:
Latitude: -29.76
Longitude: -51.15

👉 Pode alterar para qualquer cidade depois
*/

let temperatura = "--";
let climaIcone = "☀️";

function buscarClima(){

  fetch("https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true")
    .then(res => res.json())
    .then(data => {

      temperatura = Math.round(data.current_weather.temperature);

      let code = data.current_weather.weathercode;

      // Tradução simples do clima
      if(code === 0) climaIcone = "☀️";
      else if(code <= 3) climaIcone = "⛅";
      else if(code <= 48) climaIcone = "☁️";
      else if(code <= 67) climaIcone = "🌧️";
      else if(code <= 77) climaIcone = "🌨️";
      else climaIcone = "🌩️";

    })
    .catch(() => {
      console.log("Erro ao buscar clima");
    });
}

/* busca clima a cada 10 minutos */
buscarClima();
setInterval(buscarClima, 600000);

/* =====================================================
⏰ TEXTO DA BARRA
===================================================== */

function atualizarInfo(){

  let hora = new Date().toLocaleTimeString("pt-BR");

  document.getElementById("info").innerText =
    `São Leopoldo • ${temperatura}°C ${climaIcone} • ${hora} • Anuncie aqui (51) 9 8017 1851`;
}

/* atualiza a cada 5 segundos */
setInterval(atualizarInfo, 5000);
atualizarInfo();

</script>

</body>
</html>
