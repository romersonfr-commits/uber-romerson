<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bee Player DOOH</title>

  <style>
    /* ===== CONFIGURAÇÕES VISUAIS ===== */

    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* 👉 altera para contain se quiser bordas */
    }

    #statusTela {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: red;
      color: white;
      text-align: center;
      font-size: 20px;
      padding: 10px;
      display: none; /* 👉 aparece quando status = off */
      z-index: 999;
    }
  </style>
</head>
<body>

  <!-- 🔴 Tela de status OFF -->
  <div id="statusTela">TELA DESLIGADA</div>

  <!-- 🎬 Player de vídeo -->
  <video id="player" autoplay muted></video>

  <script type="module">
    // ===== IMPORTAÇÃO FIREBASE =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ===== CONFIG FIREBASE =====
    const firebaseConfig = {
      apiKey: "SUA_API_KEY", // 🔴 ALTERAR
      authDomain: "SEU_PROJETO.firebaseapp.com", // 🔴 ALTERAR
      projectId: "SEU_PROJETO", // 🔴 ALTERAR
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===== CONFIG DO DISPOSITIVO =====
    const deviceId = "04"; 
    // 🔴 ALTERAR AQUI se quiser outro dispositivo
    // exemplo: "01", "carro_10", "tablet_barbearia"

    // ===== ELEMENTOS =====
    const video = document.getElementById("player");
    const statusTela = document.getElementById("statusTela");

    let listaVideos = [];
    let index = 0;

    // ===== FUNÇÃO PARA TOCAR VÍDEOS =====
    function tocarProximoVideo() {
      if (listaVideos.length === 0) return;

      video.src = listaVideos[index];
      video.play();

      index++;
      if (index >= listaVideos.length) {
        index = 0; // 🔁 loop infinito
      }
    }

    // ===== QUANDO VÍDEO TERMINAR =====
    video.addEventListener("ended", tocarProximoVideo);

    // ===== FIREBASE TEMPO REAL =====
    onSnapshot(doc(db, "devices", deviceId), (docSnap) => {
      if (!docSnap.exists()) {
        console.log("Documento não encontrado!");
        return;
      }

      const data = docSnap.data();

      console.log("Dados recebidos:", data);

      // ================================
      // 🔴 CONTROLE DE STATUS ON/OFF
      // ================================
      if (data.status === "off") {

        console.log("Tela DESLIGADA");

        video.pause(); // para o vídeo
        video.src = ""; // limpa o player

        statusTela.style.display = "block"; // mostra aviso

        return; // 🚨 interrompe tudo aqui
      }

      // ================================
      // 🟢 STATUS ON (FUNCIONANDO)
      // ================================
      statusTela.style.display = "none";

      // ================================
      // 🎬 LISTA DE VÍDEOS
      // ================================
      if (data.videos && Array.isArray(data.videos)) {

        listaVideos = data.videos;

        console.log("Lista de vídeos:", listaVideos);

        index = 0; // 🔁 reinicia playlist
        tocarProximoVideo();
      }

    });

    // ================================
    // 🔧 CONFIGURAÇÕES FUTURAS (IDEIAS)
    // ================================

    // 👉 Você pode adicionar no Firebase:
    //
    // data.volume = 0.5
    // data.delay = 10
    // data.tipo = "imagem"
    //
    // E controlar tudo aqui depois

  </script>
</body>
</html>
