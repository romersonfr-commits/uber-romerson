<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bee DOOH Player</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🎬 VÍDEO */
#player {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  transition: opacity 0.8s;
}

/* 📺 BARRA SUPERIOR */
#topbar {
  position:fixed;
  top:0;
  width:100%;
  height:50px;
  background:rgba(0,0,0,0.7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  font-size:18px;
  z-index:10;
}

/* LOGO */
#logo {
  font-weight:bold;
  color:#FFD700;
}

/* TEXTO ROLANDO */
#marquee {
  position:absolute;
  width:100%;
  white-space:nowrap;
  overflow:hidden;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}

/* QR CODE */
#qr {
  position:fixed;
  bottom:20px;
  right:20px;
  width:100px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- 📺 BARRA -->
<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee"><span id="info">Carregando...</span></div>
</div>

<!-- 🎬 PLAYER -->
<video id="player" muted autoplay playsinline></video>

<!-- QR CODE -->
<img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/5551980171851" />

<script>
const player = document.getElementById("player");

//////////////////////////////////////////////////
// 🎬 PLAYLIST DE VÍDEOS
//////////////////////////////////////////////////

const videos = [
  "video1.mp4",
  "video2.mp4",
  "video3.mp4"
];

let index = 0;

function playNext(){
  player.style.opacity = 0;

  setTimeout(()=>{
    player.src = videos[index];
    player.play();
    player.style.opacity = 1;

    index = (index + 1) % videos.length;
  }, 800);
}

player.addEventListener("ended", playNext);
playNext();

//////////////////////////////////////////////////
// ⏰ HORA + 📍 LOCAL + 🌤️ CLIMA
//////////////////////////////////////////////////

async function atualizarInfo(){

  let hora = new Date().toLocaleTimeString("pt-BR");

  // 📍 LOCALIZAÇÃO
  navigator.geolocation.getCurrentPosition(async pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    // cidade/bairro (OpenStreetMap)
    let geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    let geoData = await geo.json();

    let bairro = geoData.address.suburb || geoData.address.neighbourhood || geoData.address.city;

    // 🌤️ CLIMA (Open-Meteo - grátis)
    let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
    let climaData = await climaReq.json();

    let temp = Math.round(climaData.current_weather.temperature);
    let emoji = "☀️";

    document.getElementById("info").innerText =
      `${bairro} • ${hora} • ${temp}°C ${emoji} • Anuncie aqui`;

  });

}

setInterval(atualizarInfo, 10000);
atualizarInfo();

</script>

</body>
</html>
