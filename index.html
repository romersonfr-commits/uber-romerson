<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bee DOOH Player</title>

  <!-- Firebase VERSÃO CORRETA -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;

      /* 🔥 FADE SEGURO */
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    .fade-out {
      opacity: 0;
    }
  </style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<script>
/* =========================
   🔧 CONFIG FIREBASE (EDITÁVEL)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

/* =========================
   🚀 INICIALIZA FIREBASE
========================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🎬 PLAYER (EDITÁVEL)
========================= */
let videos = [];
let index = 0;
const player = document.getElementById("player");

/* =========================
   ▶️ FUNÇÃO DE CARREGAR VÍDEO (COM FADE)
========================= */
function carregarVideo() {
  if (videos.length === 0) return;

  player.classList.add("fade-out");

  setTimeout(() => {

    player.src = videos[index];

    player.play().catch(() => {
      setTimeout(() => player.play(), 300);
    });

    player.classList.remove("fade-out");

  }, 800);

  player.onended = () => {
    index = (index + 1) % videos.length;
    carregarVideo();
  };
}

carregarVideo();

/* =========================
   🔥 FIREBASE
========================= */

const urlParams = new URLSearchParams(window.location.search);
const deviceId = urlParams.get("id") || "carro_01";

/* =========================
   💾 CACHE LOCAL (OFFLINE)
========================= */
function salvarCache(lista) {
  localStorage.setItem("videos_cache", JSON.stringify(lista));
}

function carregarCache() {
  const cache = localStorage.getItem("videos_cache");
  if (cache) {
    videos = JSON.parse(cache);
  }
}

// 🔥 CARREGA CACHE PRIMEIRO
carregarCache();

// 🔥 PRIMEIRO PLAY FORÇADO (FULLY)
setTimeout(() => {
  if (videos.length > 0) {
    player.src = videos[0];
    player.play().catch(() => {
      setTimeout(() => player.play(), 500);
    });
  }
}, 1000);

// 🔥 FIREBASE
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {
  const data = doc.data();

  if (data.status === "on") {
    videos = data.videos;

    salvarCache(videos);

    index = 0;

    setTimeout(() => {
      carregarVideo();
    }, 1000);
  }
});

</script>

</body>
</html>
