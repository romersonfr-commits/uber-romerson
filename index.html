<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee DOOH Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🎬 VÍDEO */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:black;
  z-index:1;
  opacity:1;
  transition: opacity 0.5s ease;
}

/* 📺 BARRA SUPERIOR (DOBRO DO TAMANHO) */
#topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100px; /* DOBRO */
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  align-items:center;
  padding:0 25px;
  z-index:10;
}

/* LOGO MAIOR */
#logo {
  font-weight:bold;
  color:#FFD700;
  margin-right:30px;
  font-size:28px; /* DOBRO */
}

/* TEXTO ROLANDO */
#marquee {
  flex:1;
  white-space:nowrap;
  overflow:hidden;
}

/* TEXTO DOBRADO */
#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
  font-size:28px; /* DOBRO */
  font-weight:500;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<!-- 📺 BARRA -->
<div id="topbar">
  <div id="logo">Bee Geomarketing</div>
  <div id="marquee">
    <span id="info">Iniciando sistema...</span>
  </div>
</div>

<!-- 🎬 PLAYER -->
<video id="player" muted autoplay playsinline webkit-playsinline></video>

<script>
const player = document.getElementById("player");

//////////////////////////////////////////////////
// 🎬 PLAYLIST
//////////////////////////////////////////////////

const videos = [
  "video1.mp4",
  "video2.mp4"
];

let index = 0;

function carregarVideo() {

  let source = videos[index];

  console.log("▶️ Tocando:", source);

  player.style.opacity = 0;

  setTimeout(() => {

    player.src = source;
    player.load();

    player.oncanplay = () => {
      player.play().catch(err => {
        console.log("Erro autoplay:", err);
      });
      player.style.opacity = 1;
    };

  }, 300);
}

// próximo vídeo
player.onended = () => {
  index = (index + 1) % videos.length;
  carregarVideo();
};

// erro
player.onerror = () => {
  console.log("❌ Erro no vídeo:", videos[index]);
  index = (index + 1) % videos.length;
  carregarVideo();
};

// iniciar
carregarVideo();

//////////////////////////////////////////////////
// ⏰ INFO + CLIMA + WHATSAPP
//////////////////////////////////////////////////

async function atualizarInfo(){

  let hora = new Date().toLocaleTimeString("pt-BR");

  function montarTexto(local, temp){
    return `${local} • ${hora} • ${temp}°C ☀️ • Anuncie aqui (51) 9 8017 1851`;
  }

  document.getElementById("info").innerText = montarTexto("São Leopoldo", "--");

  try {

    navigator.geolocation.getCurrentPosition(async pos => {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      try {
        let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        let climaData = await climaReq.json();

        let temp = Math.round(climaData.current_weather.temperature);

        document.getElementById("info").innerText =
          montarTexto("Sua região", temp);

      } catch {
        document.getElementById("info").innerText =
          montarTexto("Sua região", "--");
      }

    }, () => fallback());

  } catch {
    fallback();
  }

  async function fallback(){
    try {
      let climaReq = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true`);
      let climaData = await climaReq.json();

      let temp = Math.round(climaData.current_weather.temperature);

      document.getElementById("info").innerText =
        montarTexto("São Leopoldo", temp);

    } catch {
      document.getElementById("info").innerText =
        montarTexto("São Leopoldo", "--");
    }
  }
}

setInterval(atualizarInfo, 10000);
atualizarInfo();

//////////////////////////////////////////////////
// 🔒 AUTOPLAY GARANTIDO
//////////////////////////////////////////////////

document.addEventListener("click", () => {
  player.play().catch(() => {});
});

</script>

</body>
