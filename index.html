<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bee DOOH Player</title>

  <!-- Firebase VERSÃO CORRETA -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* =========================
       🎬 CROSSFADE (ADICIONADO)
    ========================= */
    #player, #player2 {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .ativo {
      opacity: 1;
      z-index: 2;
    }
  </style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<!-- 🎬 PLAYER EXTRA (ADICIONADO PARA CROSSFADE) -->
<video id="player2" muted playsinline></video>

<script>
/* =========================
   🔧 CONFIG FIREBASE (EDITÁVEL)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

/* =========================
   🚀 INICIALIZA FIREBASE
========================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🎬 PLAYER (EDITÁVEL)
========================= */
let videos = [];
let index = 0;
const player = document.getElementById("player");

/* =========================
   ▶️ FUNÇÃO DE CARREGAR VÍDEO
========================= */
function carregarVideo() {
  if (videos.length === 0) return;

  player.src = videos[index];
  player.play();

  player.onended = () => {
    index = (index + 1) % videos.length;
    carregarVideo();
  };
}


carregarVideo();

/* =========================
   🔥 FIREBASE (DEPOIS ATIVA)
========================= */

// 🔥 PEGA ID DA URL
const urlParams = new URLSearchParams(window.location.search);
const deviceId = urlParams.get("id") || "carro_01";

// 🔥 USA O ID DINÂMICO
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {
  const data = doc.data();

  if (data.status === "on") {
    videos = data.videos;
    index = 0;
    carregarVideo();
  }
});


/* =========================================================
   🚀 SISTEMA PROFISSIONAL ADICIONADO (SEM ALTERAR SEU CÓDIGO)
========================================================= */

// 🚫 DESATIVA PLAYER ANTIGO
player.onended = null;
player.pause();
const player2 = document.getElementById("player2");
let ativo = player;
let proximo = player2;

/* =========================
   💾 CACHE LOCAL (OFFLINE)
========================= */
function salvarCache(lista) {
  localStorage.setItem("videos_cache", JSON.stringify(lista));
}

function carregarCache() {
  const cache = localStorage.getItem("videos_cache");
  if (cache) {
    videos = JSON.parse(cache);
  }
}

/* =========================
   🎬 PRÉ-CARREGAMENTO
========================= */
function preloadVideo(url, videoEl) {
  videoEl.src = url;
  videoEl.load();
}

/* =========================
   🔄 CROSSFADE REAL
========================= */
function tocarComCrossfade() {
  if (videos.length === 0) return;

  const urlAtual = videos[index];
  const proximoIndex = (index + 1) % videos.length;
  const urlProximo = videos[proximoIndex];

 proximo.src = urlAtual;
proximo.load();

proximo.oncanplaythrough = () => {
    proximo.play();

    proximo.classList.add("ativo");
    ativo.classList.remove("ativo");

    setTimeout(() => {
      ativo.pause();

      // troca referências
      const temp = ativo;
      ativo = proximo;
      proximo = temp;

      index = proximoIndex;

      tocarComCrossfade();
    }, 1000);
  };

  /* =========================
     ❌ FALLBACK AUTOMÁTICO
  ========================= */
  proximo.onerror = () => {
    console.log("Erro no vídeo, pulando...");
    index = proximoIndex;
    tocarComCrossfade();
  };
}

/* =========================
   🔌 INICIA SISTEMA
========================= */

// tenta cache primeiro (offline)
carregarCache();

// quando firebase atualizar → salva cache + inicia player avançado
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {
  const data = doc.data();

  if (data.status === "on") {
    videos = data.videos;

    salvarCache(videos);

    index = 0;
    tocarComCrossfade();
  }
});

</script>

</body>
</html>
