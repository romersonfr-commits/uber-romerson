<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bee DOOH Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial; /* 👉 Você pode alterar a fonte aqui */
}

#player {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover; /* 👉 "cover" preenche a tela inteira (pode cortar vídeo)
                       👉 use "contain" se quiser mostrar o vídeo inteiro */
  background:black;
  z-index:1;

  opacity:1;
  transition: opacity 0.8s ease-in-out; /* 👉 controla a suavidade da troca de vídeos */
}

#topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:30px; /* 👉 altura da barra superior (pode aumentar/diminuir) */
  background:rgba(0,0,0,0.50); /* 👉 transparência da barra */
  color:white;
  display:flex;
  align-items:center;
  padding:0 25px;
  z-index:10;
}

#logo {
  font-size:28px; /* 👉 tamanho do logo */
  color:#FFD700; /* 👉 cor do texto/logo */
  margin-right:30px;
  font-weight:bold;
}

/* 👉 COMO TROCAR LOGO POR IMAGEM (ex: Cloudinary)
   1. Substitua a DIV por:
      <img id="logo" src="URL_DA_IMAGEM">

   2. E adicione no CSS:
      #logo {
        height:60px;
      }

   ✔ SIM, você pode hospedar no Cloudinary normalmente
   ✔ Exemplo:
   https://res.cloudinary.com/SEU_ID/image/upload/logo.png
*/

#marquee {
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

#marquee span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 23s linear infinite; /* 👉 velocidade do texto rolando */
  font-size:28px;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-100%); }
}
</style>

</head>

<body>

<div id="topbar">
  <div id="logo">Bee Geo</div> <!-- 👉 TEXTO DO LOGO (pode alterar aqui) -->

  <!-- 👉 PARA USAR IMAGEM NO LUGAR:
       <img id="logo" src="https://res.cloudinary.com/.../logo.png">
  -->

  <div id="marquee">
    <span id="info"></span> <!-- 👉 TEXTO DINÂMICO (cidade, clima, etc) -->
  </div>
</div>

<video id="player" muted playsinline></video>

<script>

/* VÍDEOS */
const videos = [

/* 👉 AQUI VOCÊ ADICIONA / REMOVE ANÚNCIOS
   ✔ Cada linha = 1 vídeo
   ✔ Pode usar Cloudinary (RECOMENDADO)
   ✔ Pode repetir vídeos (como você já fez com "Anuncie Aqui")
*/



"https://res.cloudinary.com/dfe8shcvj/video/upload/f_mp4/v1774643056/Anuncie_Aqui_q2zx9r.mp4"

];

let index = 0;
const player = document.getElementById("player");

function carregarVideo(){

  let src = videos[index]; /* 👉 pega o vídeo atual da lista */

  player.style.opacity = 0; /* 👉 inicia fade-out */

  setTimeout(() => {

    player.pause();
    player.removeAttribute("src");
    player.load();

    player.src = src;

    player.play().catch(()=>{});

    setTimeout(() => {
      player.style.opacity = 1; /* 👉 fade-in */
    }, 100);

  }, 800); /* 👉 tempo da transição */
}

player.onended = () => {
  index = (index + 1) % videos.length; /* 👉 passa para o próximo vídeo */
  carregarVideo();
};

player.onerror = () => {
  index = (index + 1) % videos.length; /* 👉 se der erro, pula */
  setTimeout(carregarVideo, 2000);
};

carregarVideo();

/* 🌦️ CLIMA */
let temperatura = "--";
let climaIcone = "☀️";

function buscarClima(){

  fetch("https://api.open-meteo.com/v1/forecast?latitude=-29.76&longitude=-51.15&current_weather=true")
  /* 👉 ALTERAR LOCALIZAÇÃO:
     latitude / longitude da cidade desejada
     Ex: Porto Alegre = -30.03, -51.23
  */

    .then(res => res.json())
    .then(data => {

      temperatura = Math.round(data.current_weather.temperature);

      let code = data.current_weather.weathercode;

      if(code === 0) climaIcone = "☀️";
      else if(code <= 3) climaIcone = "⛅";
      else if(code <= 48) climaIcone = "☁️";
      else if(code <= 67) climaIcone = "🌧️";
      else if(code <= 77) climaIcone = "🌨️";
      else climaIcone = "🌩️";

    })
    .catch(() => {});
}

buscarClima();
setInterval(buscarClima, 600000); /* 👉 atualiza clima a cada 10 min */

/* 📅 INFO */
function atualizarInfo(){

  let agora = new Date();

  let hora = agora.toLocaleTimeString("pt-BR");
  let diaSemana = agora.toLocaleDateString("pt-BR", { weekday: 'long' });
  let data = agora.toLocaleDateString("pt-BR");

  document.getElementById("info").innerText =
    `São Leopoldo • ${temperatura}°C ${climaIcone} • ${diaSemana} • ${data} • ${hora} • Anuncie aqui (51) 9 8017 1851`;

  /* 👉 VOCÊ PODE ALTERAR:
     - nome da cidade
     - telefone
     - mensagem de CTA
  */
}

setInterval(atualizarInfo, 5000);
atualizarInfo();

/* 🔄 AUTO RELOAD (SOLUÇÃO 2) */
setTimeout(() => {
  location.reload(true);
}, 420000); // 7 minutos

/* 👉 IMPORTANTE:
   Isso força atualização do conteúdo (evita cache travado do GitHub)
   ✔ Ideal para Fully Kiosk
*/

</script>

</body>
</html>
