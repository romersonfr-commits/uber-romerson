<script>

/* =========================
   📍 LOCALIZAÇÃO DO DISPOSITIVO
========================= */
let minhaLat = null;
let minhaLng = null;

navigator.geolocation.watchPosition(
  (pos) => {
    minhaLat = pos.coords.latitude;
    minhaLng = pos.coords.longitude;
  },
  (err) => {
    console.log("Erro GPS:", err);
  },
  { enableHighAccuracy: true }
);

/* =========================
   📏 CALCULAR DISTÂNCIA (KM)
========================= */
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371; // raio da Terra
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

/* =========================
   🔥 FIREBASE COM GEOPONT
========================= */
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {
  const data = doc.data();

  if (!data || data.status !== "on") return;
  if (!data.videos) return;

  if (minhaLat === null) {
    console.log("Aguardando GPS...");
    return;
  }

  // 🔥 FILTRA POR LOCALIZAÇÃO
  const filtrados = data.videos.filter(v => {
    if (!v.local || !v.raio) return false;

    const lat = v.local.latitude;
    const lng = v.local.longitude;

    const distancia = calcularDistancia(minhaLat, minhaLng, lat, lng);

    console.log("Distância:", distancia, "Raio:", v.raio);

    return distancia <= v.raio;
  });

  // 🔥 EXTRAI SOMENTE AS URLs
  const urls = filtrados.map(v => v.url);

  if (urls.length === 0) {
    console.log("Nenhum vídeo na região");
    return;
  }

  videos = urls;

  salvarCache(videos);

  index = 0;

  setTimeout(() => {
    carregarVideo();
  }, 1000);
});

</script>
