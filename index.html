<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bee DOOH Player</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      position: absolute; /* 🔥 permite sobreposição */
      width: 100vw;
      height: 100vh;
      object-fit: cover;

      opacity: 0;
      transition: opacity 1s ease-in-out; /* 🔥 velocidade da transição */
    }

    /* 🔥 vídeo ativo visível */
    video.ativo {
      opacity: 1;
    }
  </style>
</head>

<body>

<!-- 🔥 DOIS PLAYERS (Netflix real) -->
<video id="player1" muted playsinline></video>
<video id="player2" muted playsinline></video>

<script>
/* =========================
   🔧 CONFIG FIREBASE
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

/* =========================
   🚀 INICIALIZA FIREBASE
========================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🎬 PLAYER
========================= */
let videos = [];
let index = 0;

/* 🔥 DOIS PLAYERS */
const player1 = document.getElementById("player1");
const player2 = document.getElementById("player2");

let ativo = player1;
let proximo = player2;

/* =========================
   ▶️ FUNÇÃO DE CARREGAR VÍDEO (NETFLIX REAL)
========================= */
function carregarVideo() {
  if (videos.length === 0) return;

  // 🔥 define próximo vídeo
  proximo.src = videos[index];

  proximo.onloadeddata = () => {

    // ▶️ inicia próximo vídeo
    proximo.play().catch(err => {
      console.log("Erro ao dar play:", err);
    });

    // 🔥 entra suave
    proximo.classList.add("ativo");

    // 🔥 sai suave
    ativo.classList.remove("ativo");

    // 🔄 troca players
    [ativo, proximo] = [proximo, ativo];

    // 🔁 próximo índice
    index = (index + 1) % videos.length;

    // ⏱️ quando terminar, chama o próximo
    ativo.onended = () => {
      carregarVideo();
    };
  };
}

/* =========================
   🔥 FIREBASE REALTIME
========================= */

// 🔥 PEGA ID DA URL
const urlParams = new URLSearchParams(window.location.search);
const deviceId = urlParams.get("id") || "carro_01";

// 🔥 ESCUTA ALTERAÇÕES
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {

  const data = doc.data();

  // 🔥 segurança
  if (!data) return;

  // 🔥 só roda se estiver ON
  if (data.status === "on" && data.playlist) {

    // 🔥 converte playlist → lista de vídeos
    videos = data.playlist
      .filter(item => item.tipo === "video" && item.url)
      .map(item => item.url);

    index = 0;
    carregarVideo();
  }

});
</script>

</body>
</html>
