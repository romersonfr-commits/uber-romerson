<body>

<!-- 🔥 TESTE VISUAL (PODE REMOVER DEPOIS)
👉 Se aparecer na tela, o site está carregando corretamente -->
<h1 style="color:white">SITE CARREGOU</h1>

<video id="player" autoplay muted playsinline></video>

<script>

/* =========================
   🔐 CONFIG FIREBASE (EDITÁVEL)
   👉 Aqui ficam os dados do seu projeto Firebase
   👉 Só altere se trocar de projeto
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

/* =========================
   🚀 INICIALIZA FIREBASE
   👉 NÃO ALTERAR
========================= */
firebase.initializeApp(firebaseConfig);

/* =========================
   🔗 CONEXÃO COM BANCO
   👉 NÃO ALTERAR
========================= */
const db = firebase.firestore();

/* =========================
   🚗 IDENTIFICAÇÃO DO TABLET (NOVO)
   👉 Cada tablet usa um ID diferente
   👉 Esse ID vem da URL
   👉 Exemplo:
   site.com/?id=carro_01
========================= */

// 🔥 PEGA PARÂMETROS DA URL
const urlParams = new URLSearchParams(window.location.search);

// 🔥 DEFINE QUAL CARRO É ESSE TABLET
// 👉 Se não tiver ?id= na URL, usa "carro_01" como padrão
const deviceId = urlParams.get("id") || "carro_01";

// 👉 MOSTRA NO CONSOLE QUAL CARRO ESTÁ ATIVO
console.log("🚗 Dispositivo atual:", deviceId);


/* =========================
   🎬 PLAYER (EDITÁVEL)
   👉 Aqui ficam os vídeos carregados
========================= */

// 🔥 LISTA DE VÍDEOS (vem do Firebase)
let videos = [];

// 🔥 CONTROLE DO VÍDEO ATUAL
let index = 0;

// 🔥 REFERÊNCIA DO PLAYER
const player = document.getElementById("player");


/* =========================
   ▶️ FUNÇÃO DE REPRODUÇÃO
   👉 Controla a troca automática de vídeos
========================= */
function carregarVideo() {

  // 🚫 Se não tiver vídeos, não faz nada
  if (videos.length === 0) return;

  // 🔥 Define o vídeo atual
  player.src = videos[index];

  // ▶️ Dá play
  player.play();

  // 🔄 Quando o vídeo acabar
  player.onended = () => {

    // 🔁 Vai para o próximo vídeo
    index = (index + 1) % videos.length;

    // 🔄 Chama novamente (loop infinito)
    carregarVideo();
  };
}


/* =========================
   🔥 CONEXÃO COM FIREBASE (DINÂMICO)
   👉 Aqui acontece a mágica
   👉 Cada tablet puxa dados do seu próprio "carro"
========================= */

db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {

  // 📦 Pega os dados do Firebase
  const data = doc.data();

  // 🔍 Mostra no console (debug)
  console.log("🔥 Dados recebidos:", data);

  /* =========================
     🧠 CONTROLE DE STATUS
     👉 Permite ligar/desligar anúncios remotamente
  ========================= */
  if (data.status === "on") {

    // 🎬 Atualiza lista de vídeos
    videos = data.videos;

    // 🔄 Reinicia do primeiro vídeo
    index = 0;

    // ▶️ Começa a reprodução
    carregarVideo();
  }

  /* =========================
     ⛔ SE STATUS = OFF
     👉 Para os vídeos
  ========================= */
  else {
    player.pause();
    console.log("⛔ Player pausado");
  }

});

</script>

</body>
