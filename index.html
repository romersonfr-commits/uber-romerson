<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bee DOOH Player</title>

  <!-- 🔥 EVITA CACHE (IMPORTANTE NO TABLET / FULLY KIOSK) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <!-- Firebase VERSÃO CORRETA -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 🎬 VÍDEO */
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* 🧾 SLIDE DE TEXTO */
    #slideTexto {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      background: rgba(0,0,0,0.85);
      color: white;
      text-align: center;

      opacity: 0;
      z-index: 10;
    }

    h1 {
      font-size: 40px;
      max-width: 80%;
    }

    .pulse {
      margin-top: 20px;
      font-size: 28px;
      color: yellow;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<!-- 🎬 PLAYER -->
<video id="player" autoplay muted playsinline></video>

<!-- 🧾 TEXTO -->
<div id="slideTexto">
  <h1 id="texto"></h1>
  <div class="pulse">ANUNCIE AQUI</div>
</div>

<script>

/* =========================
   🔧 CONFIG FIREBASE (EDITÁVEL)
   👉 Se trocar de projeto, altere aqui
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCtxbIfvOdQadF0lu3D6yACjyIygVDK9dU",
  authDomain: "bee-dooh.firebaseapp.com",
  projectId: "bee-dooh",
  storageBucket: "bee-dooh.firebasestorage.app",
  messagingSenderId: "594686167676",
  appId: "1:594686167676:web:77f7ee552c8ed1a4d997f9"
};

/* =========================
   🚀 INICIALIZA FIREBASE
========================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🎬 VARIÁVEIS DO PLAYER
========================= */

// 🔥 Aceita DOIS formatos:
// 1. antigo → videos: ["url1", "url2"]
// 2. novo → playlist: [{tipo: "video"}, {tipo: "texto"}]
let playlist = [];

let index = 0;

const player = document.getElementById("player");
const slideTexto = document.getElementById("slideTexto");
const texto = document.getElementById("texto");

/* =========================
   ▶️ FUNÇÃO PRINCIPAL
========================= */
function rodar() {

  if (playlist.length === 0) {
    console.log("⚠️ Playlist vazia");
    return;
  }

  const item = playlist[index];

  /* 🎬 VÍDEO */
  if (item.tipo === "video") {

    slideTexto.style.opacity = 0;
    player.style.display = "block";

    player.src = item.url;

    player.play().catch(err => {
      console.log("Erro autoplay:", err);
    });

    player.onended = proximo;
  }

  /* 🧾 TEXTO */
  else if (item.tipo === "texto") {

    player.pause();
    player.style.display = "none";

    texto.innerText = item.conteudo || "Anuncie aqui";

    slideTexto.style.opacity = 1;

    setTimeout(proximo, item.tempo || 6000);
  }
}

/* =========================
   🔄 PRÓXIMO ITEM
========================= */
function proximo() {
  index = (index + 1) % playlist.length;
  rodar();
}

/* =========================
   🔥 ID DO DISPOSITIVO (EDITÁVEL)
   👉 permite controlar vários carros
========================= */
const urlParams = new URLSearchParams(window.location.search);
const deviceId = urlParams.get("id") || "carro_01";

/* =========================
   🔥 FIREBASE TEMPO REAL
========================= */
db.collection("devices").doc(deviceId)
.onSnapshot((doc) => {

  if (!doc.exists) {
    console.log("❌ Documento não encontrado");
    return;
  }

  const data = doc.data();

  /* 🔌 STATUS */
  if (data.status !== "on") {
    player.pause();
    return;
  }

  /* =========================
     🧠 COMPATIBILIDADE INTELIGENTE
  ========================= */

  // 👉 NOVO FORMATO (RECOMENDADO)
  if (data.playlist) {
    playlist = data.playlist;
  }

  // 👉 FORMATO ANTIGO (SEU ATUAL)
  else if (data.videos) {
    playlist = data.videos.map(url => ({
      tipo: "video",
      url: url
    }));
  }

  else {
    console.log("⚠️ Nenhum conteúdo encontrado");
    return;
  }

  index = 0;
  rodar();
});

</script>

</body>
</html>
